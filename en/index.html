<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <meta name="description" content="A lunch roulette for office workers! Automatically finds restaurants near your office and picks one at random. No more agonizing over what's for lunch!">
    <meta name="keywords" content="lunch roulette, lunch menu picker, restaurants near office, random food picker, office lunch">
    <meta name="author" content="워라밸러스">

    <!-- Open Graph (SNS 공유용) -->
    <meta property="og:title" content="Office Lunch Roulette 🎡 - What's for Lunch Today?">
    <meta property="og:description" content="Automatically finds restaurants near your office and picks one at random. No more lunch-time indecision!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nyungbin.github.io/office-lunch-roulette/en/">

    <title>Office Lunch Roulette 🎡</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <!-- Kakao Maps SDK -->
    <!-- [IMPORTANT] Replace YOUR_APP_KEY with your actual Kakao Javascript API Key -->
    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2cc98df913bf68f6f6b3c29fa6018b56&libraries=services"></script>
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <span class="emoji">🎡</span>
                <h1>Office Lunch<br><span class="highlight">Roulette</span></h1>
            </div>
            <p class="subtitle">Stop stressing about lunch — just spin! 🥄</p>
        </header>

        <main>
            <!-- Search Section -->
            <section id="search-section" class="card search-card">
                <div class="search-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="params-input" placeholder="Enter company, building, or address" autofocus>
                        <button id="search-btn" class="action-btn">Search</button>
                    </div>
                </div>

                <div id="search-results" class="results-area hidden"></div>
            </section>

            <!-- Mode/Distance Selection (Previously Selection Display) -->
            <section id="selection-section" class="card selection-card hidden">
                <div class="selected-info">
                    <span class="label">Selected Location</span>
                    <h3 id="selected-name">Kakao Pangyo Agit</h3>
                </div>

                <div class="distance-selector">
                    <p class="selector-label">Distance (on foot)</p>
                    <div class="radio-group">
                        <label class="radio-btn">
                            <input type="radio" name="distance" value="400" checked>
                            <span>5 min<br>(400m)</span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="distance" value="800">
                            <span>10 min<br>(800m)</span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="distance" value="1200">
                            <span>15 min<br>(1.2km)</span>
                        </label>
                    </div>
                </div>

                <button id="find-restaurants-btn" class="primary-btn glow-effect">
                    🍽️ Find Nearby Restaurants
                </button>
            </section>

            <!-- Roulette Section -->
            <section id="roulette-section" class="card roulette-card hidden">
                <div class="roulette-header">
                    <h3>Today's <span id="candidate-count">20</span> Picks</h3>
                    <p>Not feeling any of these?</p>
                    <button id="refresh-candidates-btn" class="text-btn">🔄 Refresh Picks</button>
                </div>

                <div class="roulette-container">
                    <canvas id="roulette-canvas" width="350" height="350"></canvas>
                    <div class="roulette-pointer">▼</div>
                </div>

                <div class="roulette-actions">
                    <button id="roulette-start-btn" class="primary-btn spin-btn">
                        🎰 Spin the Wheel!
                    </button>
                </div>
            </section>
        </main>

        <footer class="main-footer">
            <p>© 2025 Office Worker's Emergency Exit</p>
            <nav class="lang-switch">
                <a href="../">한국어</a><span class="lang-sep">·</span><a href="./" class="lang-current">English</a>
            </nav>
        </footer>
    </div>

    <script src="../script.js"></script>
</body>

</html>
